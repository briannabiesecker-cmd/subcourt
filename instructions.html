<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rally — Instructions</title>
  <style>
    body { margin: 0; padding: 0; background: #fff; }
    #loading {
      padding: 3rem;
      text-align: center;
      font-family: Arial, sans-serif;
      color: #666;
    }
    #error {
      display: none;
      padding: 2rem;
      font-family: Arial, sans-serif;
      color: #900;
    }
    #error a { color: #900; }
  </style>
</head>
<body>
  <div id="loading">Loading instructions…</div>
  <div id="error"></div>

  <script>
    const PUB_URL = 'https://docs.google.com/document/d/e/2PACX-1vT_pn_Shq81mAAObYLF4-PJ1yQdg-OEyzexiTD3Wp59I_dcvBrHSaTc8uqThyWRLK0JHYnVtL1TIU5p/pub';

    fetch(PUB_URL)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(html) {
        var parser = new DOMParser();
        var gdoc   = parser.parseFromString(html, 'text/html');

        // Remove the "Published using Google Docs" info banner
        ['#header', '.published-docs-info', '.kix-appview-editor-container',
         '[aria-label="Published by Google"]'].forEach(function(sel) {
          gdoc.querySelectorAll(sel).forEach(function(el) { el.remove(); });
        });
        // Remove any small div whose sole visible content is the Google banner text
        gdoc.querySelectorAll('div').forEach(function(el) {
          if (el.children.length === 0 &&
              /published using google/i.test(el.textContent.trim())) {
            el.remove();
          }
        });

        // Strip Google redirect wrappers from every link
        gdoc.querySelectorAll('a[href*="google.com/url"]').forEach(function(a) {
          try {
            var target = new URL(a.href).searchParams.get('q');
            if (target) {
              a.href   = target;
              a.target = '_blank';
              a.rel    = 'noopener noreferrer';
            }
          } catch(_) {}
        });

        // Copy the doc's own stylesheets into this page
        gdoc.querySelectorAll('style').forEach(function(s) {
          document.head.appendChild(s.cloneNode(true));
        });

        // Render the body content (prefer #contents if present, else full body)
        var src = gdoc.getElementById('contents') || gdoc.body;
        document.body.innerHTML = src.innerHTML;
      })
      .catch(function(err) {
        document.getElementById('loading').style.display = 'none';
        var el = document.getElementById('error');
        el.innerHTML = 'Could not load instructions. ' +
          '<a href="' + PUB_URL + '" target="_blank">Open directly &rarr;</a>';
        el.style.display = '';
      });
  </script>
</body>
</html>
